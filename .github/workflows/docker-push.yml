name: Docker Push

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. 1.0.0)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version info
        id: version
        run: |
          # Используем input если запущено вручную, иначе GITHUB_REF_NAME (тег)
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          MANUAL=${{ github.event.inputs.tag && 'true' || 'false' }}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "manual=${MANUAL}" >> $GITHUB_OUTPUT
          if [[ $TAG =~ ^([0-9]+\.[0-9]+)\. ]]; then
            echo "minor=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "minor=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Client (manual - tag only)
        if: ${{ github.event.inputs.tag }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shm-client:${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build and push Client (auto - all tags)
        if: ${{ !github.event.inputs.tag }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shm-client:${{ steps.version.outputs.minor }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shm-client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
